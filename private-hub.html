<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control — Dave's Project Hub</title>
<style>
  /* Self-hosted fonts (Phase 7) — removes Google Fonts dependency */
  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('fonts/jetbrains-mono-400.woff2') format('woff2');
  }
  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 500;
    font-display: swap;
    src: url('fonts/jetbrains-mono-500.woff2') format('woff2');
  }
  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 700;
    font-display: swap;
    src: url('fonts/jetbrains-mono-700.woff2') format('woff2');
  }
  @font-face {
    font-family: 'DM Sans';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('fonts/dm-sans-400.woff2') format('woff2');
  }
  @font-face {
    font-family: 'DM Sans';
    font-style: normal;
    font-weight: 500;
    font-display: swap;
    src: url('fonts/dm-sans-500.woff2') format('woff2');
  }
  @font-face {
    font-family: 'DM Sans';
    font-style: normal;
    font-weight: 700;
    font-display: swap;
    src: url('fonts/dm-sans-700.woff2') format('woff2');
  }

  :root {
    --bg-primary: #0a0e17;
    --bg-card: #111827;
    --bg-card-hover: #1a2236;
    --bg-input: #0d1321;
    --border: #1e293b;
    --border-active: #3b82f6;
    --text-primary: #e2e8f0;
    --text-secondary: #a9b4c4;
    --text-muted: #8b95a7;
    --accent-blue: #3b82f6;
    --accent-green: #22c55e;
    --accent-amber: #f59e0b;
    --accent-red: #ef4444;
    --accent-purple: #a855f7;
    --radius: 8px;
    --mono: 'JetBrains Mono', 'SF Mono', Monaco, Consolas, 'Liberation Mono', monospace;
    --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* ── Header ── */
  .header {
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--bg-primary);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  @supports (backdrop-filter: blur(12px)) or (-webkit-backdrop-filter: blur(12px)) {
    .header {
      background: rgba(10,14,23,0.85);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    font-family: var(--mono);
    color: #fff;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .header h1 span {
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 8px;
  }

  /* ── Stats strip ── */
  .stats-strip dl { margin: 0; }
  .stats-strip dl > div { display: contents; }
  .stats-strip dd { margin: 0; }

  .stats-strip {
    display: flex;
    gap: 4px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(17,24,39,0.5);
  }

  .stat {
    flex: 1;
    padding: 12px 16px;
    border-radius: var(--radius);
    background: var(--bg-card);
    border: 1px solid var(--border);
  }

  .stat-value {
    font-size: 24px;
    font-weight: 700;
    font-family: var(--mono);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── Controls bar ── */
  .controls {
    display: flex;
    gap: 8px;
    padding: 16px 32px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1;
    min-width: 240px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent-blue); }

  .search-box::before {
    content: '⌘';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 13px;
    font-family: var(--mono);
  }

  .filter-group { display: flex; gap: 4px; }

  .filter-btn {
    padding: 8px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-size: 12px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .filter-btn.active {
    background: rgba(59,130,246,0.15);
    border-color: var(--accent-blue);
    color: var(--accent-blue);
  }

  .view-toggle {
    display: flex;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .view-btn {
    padding: 8px 12px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .view-btn.active { background: rgba(59,130,246,0.15); color: var(--accent-blue); }

  /* ── Project grid ── */
  .projects-container { padding: 16px 32px 48px; }

  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }

  .project-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* ── Card view ── */
  .project-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    transition: all 0.2s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }

  .project-card:hover {
    border-color: var(--border-active);
    background: var(--bg-card-hover);
    transform: translateY(-1px);
  }

  .project-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
  }

  .project-card[data-status="active"]::before { background: var(--accent-green); }
  .project-card[data-status="wip"]::before { background: var(--accent-amber); }
  .project-card[data-status="archived"]::before { background: var(--text-muted); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .card-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-name .featured-star { color: var(--accent-amber); font-size: 12px; }

  .card-status {
    font-size: 10px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 500;
  }

  .card-status.active { background: rgba(34,197,94,0.15); color: var(--accent-green); }
  .card-status.wip { background: rgba(245,158,11,0.15); color: var(--accent-amber); }
  .card-status.archived { background: rgba(100,116,139,0.15); color: var(--text-muted); }

  .card-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.4;
    margin-bottom: 12px;
  }

  .card-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .meta-chip {
    font-size: 11px;
    font-family: var(--mono);
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
  }

  .meta-chip.hosting { border: 1px solid rgba(255,255,255,0.08); }
  .meta-chip.category { font-family: var(--sans); }
  .meta-chip.hub-public { color: #5cdb6e; border: 1px solid rgba(92,219,110,0.25); }
  .meta-chip.hub-private { color: #8a8590; border: 1px solid rgba(138,133,144,0.2); }

  .card-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .action-btn {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--mono);
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--bg-primary);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .action-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

  .action-btn.primary {
    background: rgba(59,130,246,0.15);
    border-color: var(--accent-blue);
    color: var(--accent-blue);
  }

  .action-btn.primary:hover { background: rgba(59,130,246,0.25); }

  /* ── List view row ── */
  .project-row {
    display: grid;
    grid-template-columns: 4px 1fr 120px 100px 100px auto;
    gap: 16px;
    align-items: center;
    padding: 10px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: all 0.15s;
    font-size: 13px;
  }

  .project-row:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-active);
  }

  .row-indicator {
    width: 4px;
    height: 24px;
    border-radius: 2px;
  }

  .row-indicator.active { background: var(--accent-green); }
  .row-indicator.wip { background: var(--accent-amber); }
  .row-indicator.archived { background: var(--text-muted); }

  .row-name {
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .row-name .sub { color: var(--text-muted); font-weight: 400; font-size: 12px; }

  .row-hosting, .row-category, .row-status, .row-hub {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .row-actions { display: flex; gap: 4px; }

  .row-actions .action-btn { padding: 4px 10px; font-size: 11px; }

  /* ── Deps section ── */
  .deps-section {
    padding: 16px 32px 32px;
    border-top: 1px solid var(--border);
  }

  .deps-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .deps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 8px;
    list-style: none;
  }

  .dep-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .dep-arrow {
    color: var(--accent-purple);
    font-family: var(--mono);
    font-weight: 700;
    font-size: 14px;
    white-space: nowrap;
  }

  .dep-names {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .dep-names strong { color: var(--text-primary); }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 64px 32px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* ── Keyboard hint ── */
  .keyboard-hint {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 14px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    display: flex;
    gap: 12px;
  }

  .keyboard-hint kbd {
    background: rgba(255,255,255,0.06);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
  }

  /* ── Focus visible ── */
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--accent-blue);
    outline-offset: 2px;
  }

  /* ── Screen reader only ── */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  /* ── Filter group labels ── */
  .filter-group-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-family: var(--mono);
    padding: 0 2px;
    align-self: center;
  }

  /* ── Result count ── */
  .result-count {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text-muted);
    padding: 0 8px;
    align-self: center;
    white-space: nowrap;
  }

  /* ── Clear all button ── */
  .clear-btn {
    padding: 6px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-size: 11px;
    font-family: var(--mono);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: none;
  }

  .clear-btn.visible { display: inline-flex; }
  .clear-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }

  /* ── Empty state reset ── */
  .empty-reset {
    margin-top: 12px;
    padding: 8px 16px;
    background: rgba(59,130,246,0.12);
    border: 1px solid var(--accent-blue);
    border-radius: var(--radius);
    color: var(--accent-blue);
    font-size: 13px;
    font-family: var(--mono);
    cursor: pointer;
    transition: all 0.15s;
  }

  .empty-reset:hover { background: rgba(59,130,246,0.25); }

  /* ── Sort select ── */
  .sort-select {
    padding: 8px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-size: 12px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sort-select:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .sort-select:focus { border-color: var(--accent-blue); outline: none; }

  /* ── Highlighted card (dep hover) ── */
  .project-card.highlighted,
  .project-row.highlighted {
    border-color: var(--accent-purple) !important;
    box-shadow: 0 0 0 1px var(--accent-purple);
  }

  /* ── Dep card interactive ── */
  .dep-card {
    cursor: pointer;
    transition: all 0.15s;
  }
  .dep-card:hover {
    border-color: var(--accent-purple);
    background: var(--bg-card-hover);
  }
  .dep-card:focus-visible {
    outline: 2px solid var(--accent-purple);
    outline-offset: 2px;
  }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
    }
    .project-card:hover { transform: none; }
  }

  /* ── Active filter chips row ── */
  .active-chips {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 32px 8px;
    align-items: center;
  }
  .active-chips.visible { display: flex; }
  .active-chips-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-family: var(--mono);
    margin-right: 4px;
  }
  .filter-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 6px 4px 10px;
    background: rgba(59,130,246,0.12);
    border: 1px solid var(--accent-blue);
    border-radius: 999px;
    color: var(--accent-blue);
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 500;
  }
  .filter-chip .chip-label {
    color: var(--text-secondary);
    margin-right: 4px;
    text-transform: uppercase;
    font-size: 9px;
    letter-spacing: 0.06em;
  }
  .filter-chip button {
    background: transparent;
    border: none;
    color: var(--accent-blue);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    padding: 0 4px;
    border-radius: 50%;
  }
  .filter-chip button:hover { color: var(--accent-red); }

  /* ── Detail drawer ── */
  .drawer-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(2,6,16,0.72);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }

  .detail-drawer {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(480px, 100vw);
    background: var(--bg-card);
    border-left: 1px solid var(--border);
    z-index: 201;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    display: flex;
    flex-direction: column;
    box-shadow: -12px 0 48px rgba(0,0,0,0.5);
  }
  .detail-drawer.open { transform: translateX(0); }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .drawer-header h2 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .drawer-close {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .drawer-close:hover { border-color: var(--accent-red); color: var(--accent-red); }

  .drawer-content {
    padding: 20px 24px;
    overflow-y: auto;
    flex: 1;
  }

  .drawer-section {
    margin-bottom: 20px;
  }
  .drawer-section h3 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-family: var(--mono);
    margin-bottom: 6px;
  }
  .drawer-section p, .drawer-section .drawer-value {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
    word-break: break-word;
  }
  .drawer-section code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg-input);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--text-primary);
  }
  .drawer-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .drawer-actions {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .project-card { cursor: pointer; }
  .project-row { cursor: pointer; }

  /* ── Breakpoints ── */
  @media (min-width: 1025px) and (max-width: 1400px) {
    .project-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  @media (min-width: 1401px) {
    .projects-container,
    .stats-strip,
    .controls,
    .active-chips,
    .deps-section,
    .header {
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }
    .project-grid {
      grid-template-columns: repeat(auto-fill, minmax(340px, 440px));
      justify-content: start;
    }
  }

  @media (max-width: 1024px) {
    .filter-group { flex-wrap: wrap; }
  }

  @media (max-width: 768px) {

let manifestData = FALLBACK_MANIFEST;

let manifestError = null;

function validateManifest(data) {
  const errors = [];
  const warnings = [];
  if (!data || typeof data !== 'object') {
    errors.push('Manifest is not an object');
    return { ok: false, errors, warnings };
  }
  if (!data.meta || typeof data.meta !== 'object') {
    errors.push('Missing meta object');
  } else if (!data.meta.owner) {
    errors.push('Missing meta.owner');
  }
  if (!Array.isArray(data.projects)) {
    errors.push('projects is not an array');
  } else {
    data.projects.forEach((p, i) => {
      if (!p || typeof p !== 'object') {
        errors.push(`projects[${i}] is not an object`);
        return;
      }
      if (!p.id) errors.push(`projects[${i}] missing id`);
      if (!p.name) errors.push(`projects[${i}] missing name`);
      if (!p.status) warnings.push(`projects[${i}] (${p.id || '?'}) missing status`);
      if (!p.category) warnings.push(`projects[${i}] (${p.id || '?'}) missing category`);
      if (!p.description) warnings.push(`projects[${i}] (${p.id || '?'}) missing description`);
      if (!Array.isArray(p.tags)) warnings.push(`projects[${i}] (${p.id || '?'}) tags is not an array`);
    });
  }
  if (!data.categories || typeof data.categories !== 'object') {
    warnings.push('Missing categories map');
  }
  if (!data.hostingPlatforms || typeof data.hostingPlatforms !== 'object') {
    warnings.push('Missing hostingPlatforms map');
  }
  return { ok: errors.length === 0, errors, warnings };
}

async function loadManifest() {
  try {
    const response = await fetch('./project-manifest.json', { cache: 'no-store' });
    if (!response.ok) {
      throw new Error(`Manifest request failed with ${response.status}`);
    }
    const data = await response.json();
    const result = validateManifest(data);
    if (!result.ok) {
      console.error('Manifest validation failed:', result.errors);
      manifestError = 'Manifest invalid — using fallback';
      manifestData = FALLBACK_MANIFEST;
      return;
    }
    if (result.warnings.length) {
      console.warn('Manifest validation warnings:', result.warnings);
    }
    manifestData = data;
  } catch (error) {
    console.warn('Using embedded project manifest fallback.', error);
    manifestError = 'Manifest failed to load — using fallback';
    manifestData = FALLBACK_MANIFEST;
  }
}

const STORAGE_KEY = 'private-hub-state';
const DEFAULT_STATE = {
  search: '',
  category: null,
  status: null,
  publicHub: null,
  view: 'grid',
  sort: 'featured'
};

let state = { ...DEFAULT_STATE };

function persistState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) { /* private mode / quota */ }
}

function loadPersistedState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}

function clearPersistedState() {
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
}

function readUrlState() {
  const params = new URLSearchParams(window.location.search);
  const out = {};
  if (params.has('search')) out.search = params.get('search') || '';
  if (params.has('category')) out.category = params.get('category') || null;
  if (params.has('status')) out.status = params.get('status') || null;
  if (params.has('hub')) out.publicHub = params.get('hub') || null;
  if (params.has('view')) out.view = params.get('view') || 'grid';
  if (params.has('sort')) out.sort = params.get('sort') || 'featured';
  return Object.keys(out).length ? out : null;
}

function syncUrlState() {
  const params = new URLSearchParams();
  if (state.search) params.set('search', state.search);
  if (state.category) params.set('category', state.category);
  if (state.status) params.set('status', state.status);
  if (state.publicHub) params.set('hub', state.publicHub);
  if (state.view && state.view !== DEFAULT_STATE.view) params.set('view', state.view);
  if (state.sort && state.sort !== DEFAULT_STATE.sort) params.set('sort', state.sort);
  const qs = params.toString();
  const newUrl = window.location.pathname + (qs ? '?' + qs : '') + window.location.hash;
  try {
    history.replaceState(null, '', newUrl);
  } catch (e) {}
}

function onStateChange() {
  persistState();
  syncUrlState();
  renderProjects();
}

function applyStateToUI() {
  // Search input
  const searchInput = document.getElementById('search');
  if (searchInput) searchInput.value = state.search || '';

  // Sort select
  const sortSel = document.getElementById('sortSelect');
  if (sortSel) sortSel.value = state.sort || 'featured';

  // Filter buttons
  const syncGroup = (containerId, attr, value) => {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.querySelectorAll('.filter-btn').forEach(b => {
      const isActive = b.dataset[attr] === value;
      b.classList.toggle('active', isActive);
      b.setAttribute('aria-pressed', isActive);
    });
  };
  syncGroup('categoryFilters', 'category', state.category);
  syncGroup('statusFilters', 'status', state.status);
  syncGroup('hubFilters', 'hub', state.publicHub);

  // View buttons
  document.querySelectorAll('.view-btn').forEach(b => {
    const isActive = b.dataset.view === state.view;
    b.classList.toggle('active', isActive);
    b.setAttribute('aria-pressed', isActive);
  });
}

// ── Init ──
async function init() {
  await loadManifest();
  document.getElementById('lastUpdated').textContent = `Updated ${manifestData.meta.lastUpdated}`;
  renderStats();
  renderFilters();
  renderDeps();

  // Restore: localStorage first, URL overrides
  const persisted = loadPersistedState();
  if (persisted) state = { ...DEFAULT_STATE, ...persisted };
  const urlState = readUrlState();
  if (urlState) state = { ...state, ...urlState };

  applyStateToUI();
  renderProjects();
  bindEvents();
}

// ── Stats ──
function makeStat(value, label, valueColor) {
  const dl = document.createElement('dl');
  dl.className = 'stat';
  const wrap = document.createElement('div');
  const dd = document.createElement('dd');
  dd.className = 'stat-value';
  if (valueColor) dd.style.color = valueColor;
  dd.textContent = String(value);
  const dt = document.createElement('dt');
  dt.className = 'stat-label';
  dt.textContent = label;
  wrap.appendChild(dd);
  wrap.appendChild(dt);
  dl.appendChild(wrap);
  return dl;
}

function renderStats() {
  const projects = manifestData.projects;
  const active = projects.filter(p => p.status === 'active').length;
  const hosted = projects.filter(p => p.hosting !== 'none' && p.hosting !== 'local').length;
  const onPublic = projects.filter(p => isOnPublicHub(p)).length;
  const platforms = new Set(projects.map(p => p.hosting).filter(h => h !== 'none')).size;

  const stats = document.getElementById('stats');
  const frag = document.createDocumentFragment();
  frag.appendChild(makeStat(projects.length, 'Total Projects'));
  frag.appendChild(makeStat(active, 'Active', 'var(--accent-green)'));
  frag.appendChild(makeStat(hosted, 'Deployed'));
  frag.appendChild(makeStat(onPublic, 'Public Hub'));
  frag.appendChild(makeStat(platforms, 'Platforms'));
  stats.replaceChildren(frag);
}

  hubContainer.replaceChildren(hubFrag);
}

// ── Filter logic ──
function isOnPublicHub(p) {
  return p.visibility === 'public';
}

function countMatches(haystack, needle) {
  if (!haystack || !needle) return 0;
  const h = String(haystack).toLowerCase();
  let count = 0, idx = 0;
  while ((idx = h.indexOf(needle, idx)) !== -1) { count++; idx += needle.length; }
  return count;
}

function scoreProject(p, q) {
  // Weighted: name 3x, tags 2x, description 1x, category/hosting 1x, featured bonus
  let score = 0;
  score += countMatches(p.name, q) * 3;
  (p.tags || []).forEach(t => { score += countMatches(t, q) * 2; });
  score += countMatches(p.description, q) * 1;
  score += countMatches(p.category, q) * 1;
  score += countMatches(p.hosting, q) * 1;
  if (score > 0 && p.featured) score += 0.5;
  return score;
}

function getFiltered() {
  const q = state.search ? state.search.toLowerCase().trim() : '';
  return manifestData.projects.filter(p => {
    if (state.category && p.category !== state.category) return false;
    if (state.status && p.status !== state.status) return false;
    if (state.publicHub === 'on-public' && !isOnPublicHub(p)) return false;
    if (state.publicHub === 'not-on-public' && isOnPublicHub(p)) return false;
    if (q) {
      p.__score = scoreProject(p, q);
      return p.__score > 0;
    }
    p.__score = 0;
    return true;
  });
}

function getFilteredAndSorted() {
  const list = getFiltered().slice();
  const cmp = (a, b) => String(a || '').localeCompare(String(b || ''));
  if (state.search) {
    list.sort((a, b) => (b.__score || 0) - (a.__score || 0) || cmp(a.name, b.name));
    return list;
  }
  switch (state.sort) {
    case 'name-asc':
      list.sort((a, b) => cmp(a.name, b.name));
      break;
    case 'name-desc':
      list.sort((a, b) => cmp(b.name, a.name));
      break;
    case 'status':
      list.sort((a, b) => cmp(a.status, b.status) || cmp(a.name, b.name));
      break;
    case 'hosting':
      list.sort((a, b) => cmp(a.hosting, b.hosting) || cmp(a.name, b.name));
      break;
    case 'category':
      list.sort((a, b) => cmp(a.category, b.category) || cmp(a.name, b.name));
      break;
    case 'featured':
    default:
      list.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0) || cmp(a.name, b.name));
      break;
  }
  return list;
}

// ── Render ──
function hasActiveFilters() {
  return state.category || state.status || state.publicHub || state.search;
}

function updateFilterChrome(count) {
  const total = manifestData.projects.length;
  const el = document.getElementById('resultCount');
  el.textContent = hasActiveFilters() ? `${count} / ${total}` : `${total} projects`;
  const clearBtn = document.getElementById('clearFilters');
  clearBtn.classList.toggle('visible', !!hasActiveFilters());
  renderActiveChips();
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function renderActiveChips() {
  const container = document.getElementById('activeChips');
  if (!container) return;
  const chips = [];
  if (state.search) {
    chips.push({ label: 'Search', value: state.search, remove: 'search' });
  }
  if (state.category) {
    const cat = manifestData.categories[state.category];
    chips.push({ label: 'Category', value: (cat && cat.label) || state.category, remove: 'category' });
  }
  if (state.status) {
    chips.push({ label: 'Status', value: state.status, remove: 'status' });
  }
  if (state.publicHub) {
    chips.push({ label: 'Hub', value: state.publicHub === 'on-public' ? 'On Public Hub' : 'Not on Public Hub', remove: 'publicHub' });
  }
  if (chips.length === 0) {
    container.classList.remove('visible');
    container.replaceChildren();
    return;
  }
  container.classList.add('visible');
  const frag = document.createDocumentFragment();
  const header = document.createElement('span');
  header.className = 'active-chips-label';
  header.textContent = 'Active';
  frag.appendChild(header);
  chips.forEach(c => {
    const span = document.createElement('span');
    span.className = 'filter-chip';
    const lbl = document.createElement('span');
    lbl.className = 'chip-label';
    lbl.textContent = c.label;
    span.appendChild(lbl);
    span.appendChild(document.createTextNode(String(c.value)));
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.dataset.remove = c.remove;
    btn.setAttribute('aria-label', `Remove ${c.label} filter`);
    btn.textContent = '×';
    span.appendChild(btn);
    frag.appendChild(span);
  });
  container.replaceChildren(frag);
}

function removeFilter(key) {
  if (key === 'search') {
    state.search = '';
    const s = document.getElementById('search');
    if (s) s.value = '';
  } else if (key === 'category') {
    state.category = null;
  } else if (key === 'status') {
    state.status = null;
  } else if (key === 'publicHub') {
    state.publicHub = null;
  }
  applyStateToUI();
  onStateChange();
}

// ── Detail drawer ──
let lastFocusedBeforeDrawer = null;
function openDrawer(projectId) {
  const p = manifestData.projects.find(x => x.id === projectId);
  if (!p) return;
  lastFocusedBeforeDrawer = document.activeElement;
  const drawer = document.getElementById('detailDrawer');
  const backdrop = document.getElementById('drawerBackdrop');
  const content = document.getElementById('drawerContent');
  const actions = document.getElementById('drawerActions');
  const title = document.getElementById('drawerTitle');
  title.textContent = p.name;

  const cat = manifestData.categories[p.category] || {};
  const host = manifestData.hostingPlatforms[p.hosting] || {};
  const parent = p.parentProject ? manifestData.projects.find(x => x.id === p.parentProject) : null;
  const deps = (p.dependencies || []).map(id => {
    const d = manifestData.projects.find(x => x.id === id);
    return d ? d.name : id;
  });
  const dependents = (p.dependents || []).map(id => {
    const d = manifestData.projects.find(x => x.id === id);
    return d ? d.name : id;
  });

  const makeSection = (heading, bodyNode) => {
    const sec = document.createElement('div');
    sec.className = 'drawer-section';
    const h = document.createElement('h3');
    h.textContent = heading;
    sec.appendChild(h);
    sec.appendChild(bodyNode);
    return sec;
  };
  const makeP = (text) => { const el = document.createElement('p'); el.textContent = text; return el; };
  const makePCode = (text) => {
    const el = document.createElement('p');
    const code = document.createElement('code');
    code.textContent = text;
    el.appendChild(code);
    return el;
  };

  const contentFrag = document.createDocumentFragment();
  contentFrag.appendChild(makeSection('Description', makeP(p.description || '—')));
  contentFrag.appendChild(makeSection('Status', makeP(`${p.status || '—'}${p.featured ? ' · ★ featured' : ''}`)));
  contentFrag.appendChild(makeSection('Category', makeP((cat.icon ? cat.icon + ' ' : '') + (cat.label || p.category || '—'))));
  contentFrag.appendChild(makeSection('Hosting', makeP(host.label || p.hosting || '—')));
  contentFrag.appendChild(makeSection('Visibility', makeP(`${p.visibility || '—'} ${isOnPublicHub(p) ? '(on public hub)' : '(private only)'}`)));
  if (parent) contentFrag.appendChild(makeSection('Parent project', makeP(parent.name)));
  if (deps.length) contentFrag.appendChild(makeSection('Dependencies', makeP(deps.join(', '))));
  if (dependents.length) contentFrag.appendChild(makeSection('Dependents', makeP(dependents.join(', '))));
  if (p.tags && p.tags.length) {
    const tagsWrap = document.createElement('div');
    tagsWrap.className = 'drawer-tags';
    p.tags.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'meta-chip';
      chip.textContent = `#${t}`;
      tagsWrap.appendChild(chip);
    });
    contentFrag.appendChild(makeSection('Tags', tagsWrap));
  }
  if (p.localPath) contentFrag.appendChild(makeSection('Local path', makePCode(p.localPath)));
  if (p.runCommand) contentFrag.appendChild(makeSection('Run command', makePCode(p.runCommand)));
  content.replaceChildren(contentFrag);

  const actionsFrag = document.createDocumentFragment();
  if (p.url) {
    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.className = 'action-btn primary';
    a.textContent = '→ Open';
    actionsFrag.appendChild(a);
  }
  if (p.repo) {
    const a = document.createElement('a');
    a.href = p.repo;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.className = 'action-btn';
    a.textContent = '⟨/⟩ Repo';
    actionsFrag.appendChild(a);
  }
  actions.replaceChildren(actionsFrag);

  drawer.hidden = false;
  backdrop.hidden = false;
  // next frame for transition
  requestAnimationFrame(() => {
    drawer.classList.add('open');
    backdrop.classList.add('open');
    drawer.setAttribute('aria-hidden', 'false');
    document.getElementById('drawerClose').focus();
  });
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  const drawer = document.getElementById('detailDrawer');
  const backdrop = document.getElementById('drawerBackdrop');
  drawer.classList.remove('open');
  backdrop.classList.remove('open');
  drawer.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
  setTimeout(() => {
    drawer.hidden = true;
    backdrop.hidden = true;
  }, 250);
  if (lastFocusedBeforeDrawer && typeof lastFocusedBeforeDrawer.focus === 'function') {
    lastFocusedBeforeDrawer.focus();
  }
}

function isDrawerOpen() {
  const drawer = document.getElementById('detailDrawer');
  return drawer && drawer.classList.contains('open');
}

function trapDrawerFocus(e) {
  if (!isDrawerOpen() || e.key !== 'Tab') return;
  const drawer = document.getElementById('detailDrawer');
  const focusables = drawer.querySelectorAll('a[href], button:not([disabled]), [tabindex]:not([tabindex="-1"])');
  if (!focusables.length) return;
  const first = focusables[0];
  const last = focusables[focusables.length - 1];
  if (e.shiftKey && document.activeElement === first) {
    e.preventDefault(); last.focus();
  } else if (!e.shiftKey && document.activeElement === last) {
    e.preventDefault(); first.focus();
  }
}

function renderProjects() {
  const projects = getFilteredAndSorted();
  const grid = document.getElementById('projectGrid');
  const list = document.getElementById('projectList');
  const empty = document.getElementById('emptyState');
  updateFilterChrome(projects.length);

  if (manifestError) {
    const note = empty.querySelector('[data-manifest-error]') || (() => {
      const n = document.createElement('div');
      n.setAttribute('data-manifest-error', '');
      n.style.cssText = 'margin-top:8px;color:var(--accent-red);font-size:12px;';
      empty.appendChild(n);
      return n;
    })();
    note.textContent = manifestError;
  }

  if (projects.length === 0) {
    grid.style.display = 'none';
    list.style.display = 'none';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';

  if (state.view === 'grid') {
    grid.style.display = 'grid';
    list.style.display = 'none';
    const frag = document.createDocumentFragment();
    projects.forEach(p => frag.appendChild(renderCard(p)));
    grid.replaceChildren(frag);
  } else {
    grid.style.display = 'none';
    list.style.display = 'flex';
    const frag = document.createDocumentFragment();
    projects.forEach(p => frag.appendChild(renderRow(p)));
    list.replaceChildren(frag);
  }
}

function makeMetaChip(text, extraClass) {
  const s = document.createElement('span');
  s.className = 'meta-chip' + (extraClass ? ' ' + extraClass : '');
  s.textContent = text;
  return s;
}

function renderCard(p) {
  const cat = manifestData.categories[p.category] || {};
  const host = manifestData.hostingPlatforms[p.hosting] || {};

  const article = document.createElement('article');
  article.className = 'project-card';
  article.dataset.status = p.status || '';
  article.dataset.projectId = p.id;

  const top = document.createElement('div');
  top.className = 'card-top';
  const nameWrap = document.createElement('div');
  nameWrap.className = 'card-name';
  if (p.featured) {
    const star = document.createElement('span');
    star.className = 'featured-star';
    star.textContent = '★';
    nameWrap.appendChild(star);
    nameWrap.appendChild(document.createTextNode(' '));
  }
  nameWrap.appendChild(document.createTextNode(p.name || ''));
  top.appendChild(nameWrap);
  const status = document.createElement('span');
  status.className = `card-status ${p.status || ''}`;
  status.textContent = p.status || '';
  top.appendChild(status);
  article.appendChild(top);

  const desc = document.createElement('div');
  desc.className = 'card-desc';
  desc.textContent = p.description || '';
  article.appendChild(desc);

  const meta = document.createElement('div');
  meta.className = 'card-meta';
  meta.appendChild(makeMetaChip(`${cat.icon || ''} ${cat.label || p.category || ''}`.trim(), 'category'));
  meta.appendChild(makeMetaChip(host.label || p.hosting || '', 'hosting'));
  meta.appendChild(makeMetaChip(isOnPublicHub(p) ? 'Public Hub' : 'Private Only', isOnPublicHub(p) ? 'hub-public' : 'hub-private'));
  (p.tags || []).slice(0, 3).forEach(t => meta.appendChild(makeMetaChip(`#${t}`)));
  article.appendChild(meta);

  const actionsWrap = document.createElement('div');
  actionsWrap.className = 'card-actions';
  buildActions(p, false).forEach(el => actionsWrap.appendChild(el));
  article.appendChild(actionsWrap);

  return article;
}

function renderRow(p) {
  const cat = manifestData.categories[p.category] || {};
  const host = manifestData.hostingPlatforms[p.hosting] || {};

  const article = document.createElement('article');
  article.className = 'project-row';
  article.dataset.projectId = p.id;

  const indicator = document.createElement('div');
  indicator.className = `row-indicator ${p.status || ''}`;
  article.appendChild(indicator);

  const name = document.createElement('div');
  name.className = 'row-name';
  name.appendChild(document.createTextNode(`${p.featured ? '★ ' : ''}${p.name || ''}`));
  if (p.parentProject) {
    const sub = document.createElement('span');
    sub.className = 'sub';
    sub.textContent = ` ↳ ${p.parentProject}`;
    name.appendChild(sub);
  }
  article.appendChild(name);

  const hosting = document.createElement('div');
  hosting.className = 'row-hosting';
  hosting.textContent = host.label || p.hosting || '';
  article.appendChild(hosting);

  const category = document.createElement('div');
  category.className = 'row-category';
  category.textContent = `${cat.icon || ''} ${cat.label || ''}`.trim();
  article.appendChild(category);

  const hub = document.createElement('div');
  hub.className = 'row-hub';
  hub.appendChild(makeMetaChip(isOnPublicHub(p) ? 'Public' : 'Private', isOnPublicHub(p) ? 'hub-public' : 'hub-private'));
  article.appendChild(hub);

  const statusCell = document.createElement('div');
  statusCell.className = 'row-status';
  statusCell.textContent = p.status || '';
  article.appendChild(statusCell);

  const actionsWrap = document.createElement('div');
  actionsWrap.className = 'row-actions';
  buildActions(p, true).forEach(el => actionsWrap.appendChild(el));
  article.appendChild(actionsWrap);

  return article;
}

function buildActions(p, compact = false) {
  const els = [];

  if (p.url) {
    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.className = 'action-btn primary';
    a.textContent = '→ Open';
    els.push(a);
  }
  if (p.repo) {
    const a = document.createElement('a');
    a.href = p.repo;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.className = 'action-btn';
    a.textContent = '⟨/⟩ Repo';
    els.push(a);
  }
  if (p.runCommand) {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'action-btn';
    b.dataset.action = 'copy';
    b.dataset.copy = p.runCommand;
    b.textContent = '▶ Run';
    els.push(b);
  }
  if (p.localPath && !compact) {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'action-btn';
    b.dataset.action = 'copy';
    b.dataset.copy = `code ${p.localPath}`;
    b.textContent = '📂 Open Local';
    els.push(b);
  }

  return els;
}

function showToast(message, color) {
  const toast = document.createElement('div');
  toast.textContent = message;
  toast.className = 'copy-toast';
  toast.style.cssText = `position:fixed;bottom:60px;right:16px;background:${color || 'var(--accent-blue)'};color:#fff;padding:8px 16px;border-radius:6px;font-size:12px;font-family:var(--mono);z-index:999;`;
  toast.setAttribute('role', 'status');
  toast.setAttribute('aria-live', 'polite');
  document.body.appendChild(toast);
  const liveRegion = document.getElementById('liveRegion');
  if (liveRegion) liveRegion.textContent = message;
  setTimeout(() => {
    toast.remove();
    if (liveRegion) liveRegion.textContent = '';
  }, 2000);
}

function copyCmd(cmd) {
  navigator.clipboard.writeText(cmd).then(() => {
    showToast(`Copied: ${cmd}`);
  }).catch(() => {
    showToast('Copy failed — check clipboard permissions', 'var(--accent-red)');
  });
}

// ── Dependencies ──
function renderDeps() {
  const deps = manifestData.projects.filter(p => p.dependents && p.dependents.length > 0);
  const depsGrid = document.getElementById('depsGrid');
  if (deps.length === 0) { document.getElementById('depsSection').style.display = 'none'; return; }

  const frag = document.createDocumentFragment();
  deps.forEach(p => {
    const li = document.createElement('li');
    li.className = 'dep-card';
    li.dataset.projectId = p.id;
    li.dataset.dependents = (p.dependents || []).join(',');
    li.tabIndex = 0;
    li.setAttribute('role', 'button');
    li.setAttribute('aria-label', `Filter to ${p.name} and its dependents`);

    const arrow = document.createElement('div');
    arrow.className = 'dep-arrow';
    arrow.textContent = `${p.name} →`;
    li.appendChild(arrow);

    const names = document.createElement('div');
    names.className = 'dep-names';
    (p.dependents || []).forEach((d, i) => {
      if (i > 0) names.appendChild(document.createTextNode(', '));
      const strong = document.createElement('strong');
      const proj = manifestData.projects.find(x => x.id === d);
      strong.textContent = proj ? proj.name : d;
      names.appendChild(strong);
    });
    li.appendChild(names);
    frag.appendChild(li);
  });
  depsGrid.replaceChildren(frag);
}

function highlightProjects(ids) {
  const set = new Set(ids);
  document.querySelectorAll('.project-card[data-project-id], .project-row[data-project-id]').forEach(el => {
    el.classList.toggle('highlighted', set.has(el.dataset.projectId));
  });
}

function clearHighlights() {
  document.querySelectorAll('.highlighted').forEach(el => el.classList.remove('highlighted'));
}

// ── Events ──
function clearAllFilters() {
  state.search = '';
  state.category = null;
  state.status = null;
  state.publicHub = null;
  document.getElementById('search').value = '';
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-pressed', 'false');
  });
  clearPersistedState();
  syncUrlState();
  renderProjects();
}

function bindEvents() {
  // Search (debounced 150ms)
  const searchInput = document.getElementById('search');
  let searchDebounceTimer = null;
  searchInput.addEventListener('input', e => {
    const value = e.target.value;
    state.search = value;
    if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => {
      searchDebounceTimer = null;
      onStateChange();
    }, 150);
  });

  function syncFilterBtns(container, attr, activeValue) {
    container.querySelectorAll('.filter-btn').forEach(b => {
      const isActive = b.dataset[attr] === activeValue;
      b.classList.toggle('active', isActive);
      b.setAttribute('aria-pressed', isActive);
    });
  }

  // Category filters
  document.getElementById('categoryFilters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    const cat = btn.dataset.category;
    state.category = state.category === cat ? null : cat;
    syncFilterBtns(document.getElementById('categoryFilters'), 'category', state.category);
    onStateChange();
  });

  // Status filters
  document.getElementById('statusFilters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    const st = btn.dataset.status;
    state.status = state.status === st ? null : st;
    syncFilterBtns(document.getElementById('statusFilters'), 'status', state.status);
    onStateChange();
  });

  // Hub filters
  document.getElementById('hubFilters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    const hub = btn.dataset.hub;
    state.publicHub = state.publicHub === hub ? null : hub;
    syncFilterBtns(document.getElementById('hubFilters'), 'hub', state.publicHub);
    onStateChange();
  });

  // Clear all filters
  document.getElementById('clearFilters').addEventListener('click', clearAllFilters);

  // Sort select
  const sortSel = document.getElementById('sortSelect');
  if (sortSel) {
    sortSel.addEventListener('change', e => {
      state.sort = e.target.value;
      onStateChange();
    });
  }

  // View toggle
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.view = btn.dataset.view;
      document.querySelectorAll('.view-btn').forEach(b => {
        b.classList.toggle('active', b === btn);
        b.setAttribute('aria-pressed', b === btn);
      });
      onStateChange();
    });
  });

  // Dependency map interactivity
  const depsGrid = document.getElementById('depsGrid');
  if (depsGrid) {
    const highlightFromCard = (card) => {
      const ids = [card.dataset.projectId, ...(card.dataset.dependents || '').split(',').filter(Boolean)];
      highlightProjects(ids);
    };
    depsGrid.addEventListener('mouseover', e => {
      const card = e.target.closest('.dep-card');
      if (card) highlightFromCard(card);
    });
    depsGrid.addEventListener('mouseout', e => {
      const card = e.target.closest('.dep-card');
      if (card) clearHighlights();
    });
    depsGrid.addEventListener('focusin', e => {
      const card = e.target.closest('.dep-card');
      if (card) highlightFromCard(card);
    });
    depsGrid.addEventListener('focusout', e => {
      const card = e.target.closest('.dep-card');
      if (card) clearHighlights();
    });
    const activate = (card) => {
      const proj = manifestData.projects.find(x => x.id === card.dataset.projectId);
      if (!proj) return;
      state.search = proj.name;
      const searchEl = document.getElementById('search');
      if (searchEl) searchEl.value = proj.name;
      onStateChange();
    };
    depsGrid.addEventListener('click', e => {
      const card = e.target.closest('.dep-card');
      if (card) activate(card);
    });
    depsGrid.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const card = e.target.closest('.dep-card');
      if (card) { e.preventDefault(); activate(card); }
    });
  }

  // Active filter chip removal
  const chipRow = document.getElementById('activeChips');
  if (chipRow) {
    chipRow.addEventListener('click', e => {
      const btn = e.target.closest('button[data-remove]');
      if (!btn) return;
      removeFilter(btn.dataset.remove);
    });
  }

  // Delegated click handler for project grid/list:
  // handles copy action buttons + card click → open drawer
  const handleProjectClick = (e) => {
    const copyBtn = e.target.closest('button[data-action="copy"]');
    if (copyBtn) {
      e.stopPropagation();
      const cmd = copyBtn.dataset.copy;
      if (cmd) copyCmd(cmd);
      return;
    }
    // Don't trigger drawer when clicking other actions (links, buttons)
    if (e.target.closest('a, button')) return;
    const el = e.target.closest('[data-project-id]');
    if (!el) return;
    openDrawer(el.dataset.projectId);
  };
  const gridEl = document.getElementById('projectGrid');
  const listEl = document.getElementById('projectList');
  if (gridEl) gridEl.addEventListener('click', handleProjectClick);
  if (listEl) listEl.addEventListener('click', handleProjectClick);

  // Drawer close / backdrop
  document.getElementById('drawerClose').addEventListener('click', closeDrawer);
  document.getElementById('drawerBackdrop').addEventListener('click', closeDrawer);

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (isDrawerOpen()) {
      if (e.key === 'Escape') { e.preventDefault(); closeDrawer(); return; }
      trapDrawerFocus(e);
      return;
    }
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') {
      if (e.key === 'Escape' && e.target.tagName === 'INPUT') {
        searchInput.blur(); searchInput.value = ''; state.search = ''; onStateChange();
      }
      return;
    }
    if (e.key === '/') { e.preventDefault(); searchInput.focus(); }
    if (e.key === 'v' || e.key === 'V') {
      state.view = state.view === 'grid' ? 'list' : 'grid';
      document.querySelectorAll('.view-btn').forEach(b => {
        const isActive = b.dataset.view === state.view;
        b.classList.toggle('active', isActive);
        b.setAttribute('aria-pressed', isActive);
      });
      onStateChange();
    }
  });
}

init();
</script>
