<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control — Dave's Project Hub</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-card: #111827;
    --bg-card-hover: #1a2236;
    --bg-input: #0d1321;
    --border: #1e293b;
    --border-active: #3b82f6;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent-blue: #3b82f6;
    --accent-green: #22c55e;
    --accent-amber: #f59e0b;
    --accent-red: #ef4444;
    --accent-purple: #a855f7;
    --radius: 8px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* ── Header ── */
  .header {
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,14,23,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    font-family: var(--mono);
    color: #fff;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .header h1 span {
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 8px;
  }

  /* ── Stats strip ── */
  .stats-strip {
    display: flex;
    gap: 4px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(17,24,39,0.5);
  }

  .stat {
    flex: 1;
    padding: 12px 16px;
    border-radius: var(--radius);
    background: var(--bg-card);
    border: 1px solid var(--border);
  }

  .stat-value {
    font-size: 24px;
    font-weight: 700;
    font-family: var(--mono);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── Controls bar ── */
  .controls {
    display: flex;
    gap: 8px;
    padding: 16px 32px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1;
    min-width: 240px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent-blue); }

  .search-box::before {
    content: '⌘';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 13px;
    font-family: var(--mono);
  }

  .filter-group { display: flex; gap: 4px; }

  .filter-btn {
    padding: 8px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-size: 12px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .filter-btn.active {
    background: rgba(59,130,246,0.15);
    border-color: var(--accent-blue);
    color: var(--accent-blue);
  }

  .view-toggle {
    display: flex;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .view-btn {
    padding: 8px 12px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .view-btn.active { background: rgba(59,130,246,0.15); color: var(--accent-blue); }

  /* ── Project grid ── */
  .projects-container { padding: 16px 32px 48px; }

  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }

  .project-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* ── Card view ── */
  .project-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    transition: all 0.2s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }

  .project-card:hover {
    border-color: var(--border-active);
    background: var(--bg-card-hover);
    transform: translateY(-1px);
  }

  .project-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
  }

  .project-card[data-status="active"]::before { background: var(--accent-green); }
  .project-card[data-status="wip"]::before { background: var(--accent-amber); }
  .project-card[data-status="archived"]::before { background: var(--text-muted); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .card-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-name .featured-star { color: var(--accent-amber); font-size: 12px; }

  .card-status {
    font-size: 10px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 500;
  }

  .card-status.active { background: rgba(34,197,94,0.15); color: var(--accent-green); }
  .card-status.wip { background: rgba(245,158,11,0.15); color: var(--accent-amber); }
  .card-status.archived { background: rgba(100,116,139,0.15); color: var(--text-muted); }

  .card-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.4;
    margin-bottom: 12px;
  }

  .card-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .meta-chip {
    font-size: 11px;
    font-family: var(--mono);
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
  }

  .meta-chip.hosting { border: 1px solid rgba(255,255,255,0.08); }
  .meta-chip.category { font-family: var(--sans); }
  .meta-chip.hub-public { color: #5cdb6e; border: 1px solid rgba(92,219,110,0.25); }
  .meta-chip.hub-private { color: #8a8590; border: 1px solid rgba(138,133,144,0.2); }

  .card-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .action-btn {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--mono);
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--bg-primary);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .action-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

  .action-btn.primary {
    background: rgba(59,130,246,0.15);
    border-color: var(--accent-blue);
    color: var(--accent-blue);
  }

  .action-btn.primary:hover { background: rgba(59,130,246,0.25); }

  /* ── List view row ── */
  .project-row {
    display: grid;
    grid-template-columns: 4px 1fr 120px 100px 100px auto;
    gap: 16px;
    align-items: center;
    padding: 10px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: all 0.15s;
    font-size: 13px;
  }

  .project-row:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-active);
  }

  .row-indicator {
    width: 4px;
    height: 24px;
    border-radius: 2px;
  }

  .row-indicator.active { background: var(--accent-green); }
  .row-indicator.wip { background: var(--accent-amber); }
  .row-indicator.archived { background: var(--text-muted); }

  .row-name {
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .row-name .sub { color: var(--text-muted); font-weight: 400; font-size: 12px; }

  .row-hosting, .row-category, .row-status, .row-hub {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .row-actions { display: flex; gap: 4px; }

  .row-actions .action-btn { padding: 4px 10px; font-size: 11px; }

  /* ── Deps section ── */
  .deps-section {
    padding: 16px 32px 32px;
    border-top: 1px solid var(--border);
  }

  .deps-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .deps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 8px;
  }

  .dep-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .dep-arrow {
    color: var(--accent-purple);
    font-family: var(--mono);
    font-weight: 700;
    font-size: 14px;
    white-space: nowrap;
  }

  .dep-names {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .dep-names strong { color: var(--text-primary); }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 64px 32px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* ── Keyboard hint ── */
  .keyboard-hint {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 14px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    display: flex;
    gap: 12px;
  }

  .keyboard-hint kbd {
    background: rgba(255,255,255,0.06);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
  }

  @media (max-width: 768px) {
    .header, .controls, .projects-container, .stats-strip, .deps-section { padding-left: 16px; padding-right: 16px; }
    .project-grid { grid-template-columns: 1fr; }
    .project-row { grid-template-columns: 4px 1fr auto; }
    .row-hosting, .row-category, .row-status, .row-hub { display: none; }
    .stats-strip { flex-wrap: wrap; }
    .stat { flex: 0 0 calc(50% - 2px); }
  }
</style>
</head>

let manifestData = FALLBACK_MANIFEST;

async function loadManifest() {
  try {
    const response = await fetch('./project-manifest.json', { cache: 'no-store' });
    if (!response.ok) {
      throw new Error(`Manifest request failed with ${response.status}`);
    }
    manifestData = await response.json();
  } catch (error) {
    console.warn('Using embedded project manifest fallback.', error);
  }
}

let state = {
  search: '',
  category: null,
  status: null,
  publicHub: null,
  view: 'grid'
};

// ── Init ──
async function init() {
  await loadManifest();
  document.getElementById('lastUpdated').textContent = `Updated ${manifestData.meta.lastUpdated}`;
  renderStats();
  renderFilters();
  renderDeps();
  renderProjects();
  bindEvents();
}

// ── Stats ──
function renderStats() {
  const projects = manifestData.projects;
  const active = projects.filter(p => p.status === 'active').length;
  const hosted = projects.filter(p => p.hosting !== 'none' && p.hosting !== 'local').length;
  const onPublic = projects.filter(p => isOnPublicHub(p)).length;
  const platforms = new Set(projects.map(p => p.hosting).filter(h => h !== 'none')).size;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-value">${projects.length}</div><div class="stat-label">Total Projects</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--accent-green)">${active}</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-value">${hosted}</div><div class="stat-label">Deployed</div></div>
    <div class="stat"><div class="stat-value">${onPublic}</div><div class="stat-label">Public Hub</div></div>
    <div class="stat"><div class="stat-value">${platforms}</div><div class="stat-label">Platforms</div></div>
  `;
}

// ── Filters ──
function renderFilters() {
  const cats = Object.entries(manifestData.categories);
  const catHTML = cats.map(([key, c]) =>
    `<button class="filter-btn" data-category="${key}">${c.icon} ${c.label}</button>`
  ).join('');
  document.getElementById('categoryFilters').innerHTML = catHTML;

  const statuses = ['active', 'wip', 'archived'];
  const statusHTML = statuses.map(s =>
    `<button class="filter-btn" data-status="${s}">${s.toUpperCase()}</button>`
  ).join('');
  document.getElementById('statusFilters').innerHTML = statusHTML;

  document.getElementById('hubFilters').innerHTML =
    `<button class="filter-btn" data-hub="on-public">On Public Hub</button>` +
    `<button class="filter-btn" data-hub="not-on-public">Not on Public Hub</button>`;
}

// ── Filter logic ──
function isOnPublicHub(p) {
  return p.visibility === 'public';
}

function getFiltered() {
  return manifestData.projects.filter(p => {
    if (state.category && p.category !== state.category) return false;
    if (state.status && p.status !== state.status) return false;
    if (state.publicHub === 'on-public' && !isOnPublicHub(p)) return false;
    if (state.publicHub === 'not-on-public' && isOnPublicHub(p)) return false;
    if (state.search) {
      const q = state.search.toLowerCase();
      const haystack = [p.name, p.description, p.category, p.hosting, ...p.tags].join(' ').toLowerCase();
      return haystack.includes(q);
    }
    return true;
  });
}

// ── Render ──
function renderProjects() {
  const projects = getFiltered();
  const grid = document.getElementById('projectGrid');
  const list = document.getElementById('projectList');
  const empty = document.getElementById('emptyState');

  if (projects.length === 0) {
    grid.style.display = 'none';
    list.style.display = 'none';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';

  if (state.view === 'grid') {
    grid.style.display = 'grid';
    list.style.display = 'none';
    grid.innerHTML = projects.map(renderCard).join('');
  } else {
    grid.style.display = 'none';
    list.style.display = 'flex';
    list.innerHTML = projects.map(renderRow).join('');
  }
}

function renderCard(p) {
  const cat = manifestData.categories[p.category] || {};
  const host = manifestData.hostingPlatforms[p.hosting] || {};
  const actions = buildActions(p);

  return `
    <div class="project-card" data-status="${p.status}">
      <div class="card-top">
        <div class="card-name">
          ${p.featured ? '<span class="featured-star">★</span>' : ''}
          ${p.name}
        </div>
        <span class="card-status ${p.status}">${p.status}</span>
      </div>
      <div class="card-desc">${p.description}</div>
      <div class="card-meta">
        <span class="meta-chip category">${cat.icon || ''} ${cat.label || p.category}</span>
        <span class="meta-chip hosting">${host.label || p.hosting}</span>
        <span class="meta-chip ${isOnPublicHub(p) ? 'hub-public' : 'hub-private'}">${isOnPublicHub(p) ? 'Public Hub' : 'Private Only'}</span>
        ${p.tags.slice(0, 3).map(t => `<span class="meta-chip">#${t}</span>`).join('')}
      </div>
      <div class="card-actions">${actions}</div>
    </div>
  `;
}

function renderRow(p) {
  const cat = manifestData.categories[p.category] || {};
  const host = manifestData.hostingPlatforms[p.hosting] || {};
  const actions = buildActions(p, true);

  return `
    <div class="project-row">
      <div class="row-indicator ${p.status}"></div>
      <div class="row-name">
        ${p.featured ? '★ ' : ''}${p.name}
        ${p.parentProject ? `<span class="sub">↳ ${p.parentProject}</span>` : ''}
      </div>
      <div class="row-hosting">${host.label || p.hosting}</div>
      <div class="row-category">${cat.icon || ''} ${cat.label || ''}</div>
      <div class="row-hub"><span class="meta-chip ${isOnPublicHub(p) ? 'hub-public' : 'hub-private'}">${isOnPublicHub(p) ? 'Public' : 'Private'}</span></div>
      <div class="row-status">${p.status}</div>
      <div class="row-actions">${actions}</div>
    </div>
  `;
}

function buildActions(p, compact = false) {
  const btns = [];

  if (p.url) {
    btns.push(`<a href="${p.url}" target="_blank" class="action-btn primary">→ Open</a>`);
  }
  if (p.repo) {
    btns.push(`<a href="${p.repo}" target="_blank" class="action-btn">⟨/⟩ Repo</a>`);
  }
  if (p.runCommand) {
    btns.push(`<button class="action-btn" onclick="copyCmd('${p.runCommand}')">▶ Run</button>`);
  }
  if (p.localPath && !compact) {
    btns.push(`<button class="action-btn" onclick="copyCmd('code ${p.localPath}')">📂 Open Local</button>`);
  }

  return btns.join('');
}

function copyCmd(cmd) {
  navigator.clipboard.writeText(cmd).then(() => {
    const toast = document.createElement('div');
    toast.textContent = `Copied: ${cmd}`;
    toast.style.cssText = 'position:fixed;bottom:60px;right:16px;background:var(--accent-blue);color:#fff;padding:8px 16px;border-radius:6px;font-size:12px;font-family:var(--mono);z-index:999;';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  });
}

// ── Dependencies ──
function renderDeps() {
  const deps = manifestData.projects.filter(p => p.dependents && p.dependents.length > 0);
  if (deps.length === 0) { document.getElementById('depsSection').style.display = 'none'; return; }

  document.getElementById('depsGrid').innerHTML = deps.map(p =>
    `<div class="dep-card">
      <div class="dep-arrow">${p.name} →</div>
      <div class="dep-names">${p.dependents.map(d => {
        const proj = manifestData.projects.find(x => x.id === d);
        return `<strong>${proj ? proj.name : d}</strong>`;
      }).join(', ')}</div>
    </div>`
  ).join('');
}

// ── Events ──
function bindEvents() {
  // Search
  const searchInput = document.getElementById('search');
  searchInput.addEventListener('input', e => {
    state.search = e.target.value;
    renderProjects();
  });

  // Category filters
  document.getElementById('categoryFilters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    const cat = btn.dataset.category;
    state.category = state.category === cat ? null : cat;
    document.querySelectorAll('#categoryFilters .filter-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.category === state.category)
    );
    renderProjects();
  });

  // Status filters
  document.getElementById('statusFilters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    const st = btn.dataset.status;
    state.status = state.status === st ? null : st;
    document.querySelectorAll('#statusFilters .filter-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.status === state.status)
    );
    renderProjects();
  });

  // Hub filters
  document.getElementById('hubFilters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    const hub = btn.dataset.hub;
    state.publicHub = state.publicHub === hub ? null : hub;
    document.querySelectorAll('#hubFilters .filter-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.hub === state.publicHub)
    );
    renderProjects();
  });

  // View toggle
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.view = btn.dataset.view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b === btn));
      renderProjects();
    });
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') {
      if (e.key === 'Escape') { searchInput.blur(); searchInput.value = ''; state.search = ''; renderProjects(); }
      return;
    }
    if (e.key === '/') { e.preventDefault(); searchInput.focus(); }
    if (e.key === 'v' || e.key === 'V') {
      state.view = state.view === 'grid' ? 'list' : 'grid';
      document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === state.view));
      renderProjects();
    }
  });
}

init();
</script>
