<meta charset="UTF-8">

<title>Dave Robertson — Projects</title>

<style>
  :root {
    --bg: #faf9f6;
    --bg-card: #ffffff;
    --bg-hover: #f5f3ef;
    --border: #e8e4dd;
    --border-hover: #d4cfc6;
    --text: #1a1a1a;
    --text-secondary: #6b6560;
    --text-muted: #9c958e;
    --accent: #c44d2c;
    --accent-soft: rgba(196,77,44,0.08);
    --green: #2d6a4f;
    --blue: #2c5282;
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'Outfit', -apple-system, sans-serif;
    --radius: 12px;
    --max-w: 1100px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Grain overlay ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .page { position: relative; z-index: 1; }

  /* ── Header ── */
  .hero {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 80px 32px 48px;
  }

  .hero-name {
    font-family: var(--serif);
    font-size: clamp(42px, 6vw, 64px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }

  .hero-sub {
    font-size: 17px;
    color: var(--text-secondary);
    font-weight: 300;
    line-height: 1.6;
    max-width: 560px;
  }

  .hero-links {
    display: flex;
    gap: 16px;
    margin-top: 24px;
  }

  .hero-link {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    text-decoration: none;
    padding: 6px 0;
    border-bottom: 1px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .hero-link:hover { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Featured ── */
  .section {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 0 32px 64px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .featured-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 16px;
  }

  .featured-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    text-decoration: none;
    color: inherit;
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .featured-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.06);
  }

  .featured-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .featured-card:hover::after { transform: scaleX(1); }

  .fc-category {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .fc-name {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .fc-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    flex: 1;
    margin-bottom: 16px;
  }

  .fc-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
  }

  .fc-tags {
    display: flex;
    gap: 8px;
  }

  .fc-tag {
    padding: 3px 10px;
    background: var(--accent-soft);
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
  }

  .fc-arrow {
    font-size: 18px;
    transition: transform 0.2s;
  }

  .featured-card:hover .fc-arrow { transform: translateX(4px); }

  /* ── Directory ── */
  .directory-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .dir-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
    display: block;
  }

  .dir-card:hover {
    border-color: var(--border-hover);
    background: var(--bg-hover);
  }

  .dir-name {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .dir-name .arrow { color: var(--text-muted); font-size: 14px; transition: transform 0.2s; }
  .dir-card:hover .dir-name .arrow { transform: translateX(3px); color: var(--accent); }

  .dir-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .dir-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 12px;
  }

  /* ── Category sections ── */
  .cat-section { margin-bottom: 48px; }
  .cat-section:last-child { margin-bottom: 0; }

  .cat-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cat-count {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* ── Footer ── */
  .footer {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 32px 32px 48px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--text-muted);
  }

  .footer a { color: var(--text-secondary); text-decoration: none; }
  .footer a:hover { color: var(--accent); }

  @media (max-width: 640px) {
    .hero { padding: 48px 20px 32px; }
    .section, .footer { padding-left: 20px; padding-right: 20px; }
    .featured-grid { grid-template-columns: 1fr; }
    .directory-grid { grid-template-columns: 1fr; }
  }
</style>

let manifestData = FALLBACK_MANIFEST;

async function loadManifest() {
  try {
    const response = await fetch('./project-manifest.json', { cache: 'no-store' });
    if (!response.ok) {
      throw new Error(`Manifest request failed with ${response.status}`);
    }
    manifestData = await response.json();
  } catch (error) {
    console.warn('Using embedded project manifest fallback.', error);
  }
}

async function init() {
  await loadManifest();
  renderFeatured();
  renderDirectory();
}

function renderFeatured() {
  const featured = manifestData.projects.filter(p =>
    p.featured && (p.visibility === 'public')
  );

  document.getElementById('featuredGrid').innerHTML = featured.map(p => {
    const cat = manifestData.categories[p.category] || {};
    const href = p.url || p.repo;
    return `
      <a href="${href}" target="_blank" class="featured-card">
        <div class="fc-category">${cat.icon || ''} ${cat.label || p.category}</div>
        <div class="fc-name">${p.name}</div>
        <div class="fc-desc">${p.description}</div>
        <div class="fc-footer">
          <div class="fc-tags">
            ${p.tags.slice(0, 2).map(t => `<span class="fc-tag">${t}</span>`).join('')}
          </div>
          <span class="fc-arrow">&rarr;</span>
        </div>
      </a>
    `;
  }).join('');
}

function renderDirectory() {
  const visible = manifestData.projects.filter(p =>
    p.visibility === 'public' && !p.featured && p.id !== 'davehomeassist-hub'
  );

  // Group by category
  const grouped = {};
  visible.forEach(p => {
    if (!grouped[p.category]) grouped[p.category] = [];
    grouped[p.category].push(p);
  });

  const container = document.getElementById('directoryContent');
  container.innerHTML = Object.entries(grouped).map(([catKey, projects]) => {
    const cat = manifestData.categories[catKey] || {};
    return `
      <div class="cat-section">
        <div class="cat-label">${cat.icon || ''} ${cat.label || catKey} <span class="cat-count">${projects.length}</span></div>
        <div class="directory-grid">
          ${projects.map(p => {
            const host = manifestData.hostingPlatforms[p.hosting] || {};
            const href = p.url || p.repo;
            return `
              <a href="${href}" target="_blank" class="dir-card">
                <div class="dir-name">${p.name} <span class="arrow">&rarr;</span></div>
                <div class="dir-desc">${p.description}</div>
                <div class="dir-meta">
                  <span>${host.label || p.hosting}</span>
                  <span>${p.tags[0] || ''}</span>
                </div>
              </a>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

init();
